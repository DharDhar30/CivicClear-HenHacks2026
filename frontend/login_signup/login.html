<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CivicClear Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="container">

    <img src="CivicClear.png" class="logo">
    <p class="subtitle">Login to continue</p>

    <p class="switch">
      Don’t have an account?
      <a href="signup.html">Sign up</a>
    </p>
    <form id="loginForm">

      <label>Email</label>
      <input
        type="email"
        id="email"
        placeholder="Enter your email"
        required
      >

      <label>Password</label>
      <input
        type="password"
        id="password"
        placeholder="Enter your password"
        required
      >

      <button type="submit">Login</button>

      <p id="message"></p>

    </form>

  </div>

  <script src="login.js"></script>

</body>
</html>
